syntax = "proto3";

package atlas.filetree.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "atlas/filetree/v1/params.proto";
import "atlas/filetree/v1/tree.proto";

option go_package = "nebulix/x/filetree/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/atlas/filetree/v1/params";
  }

  // TreeNode Queries a list of TreeNode items.
  rpc TreeNode(QueryTreeNodeRequest) returns (QueryTreeNodeResponse) {
    option (google.api.http).get = "/atlas/filetree/v1/file_tree_node/{path}";
  }

  // FileTreePaths Queries a list of FileTreePaths items.
  rpc FileTreePaths(QueryFileTreePathsRequest) returns (QueryFileTreePathsResponse) {
    option (google.api.http).get = "/atlas/filetree/v1/file_tree_paths/{basepath}";
  }

  // TreeNodeChildren Queries a list of TreeNodeChildren items.
  rpc TreeNodeChildren(QueryTreeNodeChildrenRequest) returns (QueryTreeNodeChildrenResponse) {
    option (google.api.http).get = "/atlas/filetree/v1/file_node_children/{owner}/{path}";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// QueryTreeNodeRequest defines the QueryTreeNodeRequest message.
message QueryTreeNodeRequest {
  string owner = 1;
  string path = 2;
}

// QueryTreeNodeResponse defines the QueryTreeNodeResponse message.
message QueryTreeNodeResponse {
  TreeNode node = 1;
}

// QueryFileTreePathsRequest defines the QueryFileTreePathsRequest message.
message QueryFileTreePathsRequest {
  string owner = 1;
  string basepath = 2;
}

// QueryFileTreePathsResponse defines the QueryFileTreePathsResponse message.
message QueryFileTreePathsResponse {
  repeated string paths = 1;
}

// QueryTreeNodeChildrenRequest defines the QueryTreeNodeChildrenRequest message.
message QueryTreeNodeChildrenRequest {
  string owner = 1;
  string path = 2;
}

// QueryTreeNodeChildrenResponse defines the QueryTreeNodeChildrenResponse message.
message QueryTreeNodeChildrenResponse {
  repeated TreeNode nodes = 1;
}
