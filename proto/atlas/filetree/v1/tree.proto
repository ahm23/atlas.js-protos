syntax = "proto3";
package atlas.filetree.v1;

option go_package = "atlas/x/filetree/types";

message AuthorityBundle {
  string address = 1;
  string secret = 2;
}

message TreeNode {
  string node_type = 1;
  string contents = 2;
  repeated AuthorityBundle viewers = 3;
  repeated AuthorityBundle editors = 4;
}
